name: focarm
description: Material 3 Flutter rewrite of the tomato-clock focus garden.
publish_to: none
version: 1.1.2+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/plants/
    - assets/icons/icon.png
